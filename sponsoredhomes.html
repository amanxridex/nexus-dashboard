<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sponsored Homes | NEXUS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/index.css">
    <style>
        .form-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 0 auto;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-primary); }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px;
            background: var(--bg-light); color: var(--text-primary); font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        .submit-btn {
            background: #4f46e5; color: white; border: none; width: 100%; padding: 15px;
            border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { background: #4338ca; }
        
        .preview-img { max-width: 100%; border-radius: 12px; margin-top: 10px; display: none; }
        
        .queue-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 30px auto;
        }
        .queue-title { margin-bottom: 20px; font-size: 1.25rem; font-weight: 700; color: var(--text-primary); }
        .queue-table { width: 100%; border-collapse: collapse; }
        .queue-table th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-weight: 600; }
        .queue-table td { padding: 15px 12px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        
        .ad-thumb { width: 60px; height: 40px; border-radius: 6px; object-fit: cover; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }
        .status-active { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-hidden { background: rgba(107, 114, 128, 0.1); color: #6b7280; }
        
        .action-btns { display: flex; gap: 8px; }
        .action-btn { 
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border-color);
            background: var(--bg-light); color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .action-btn:hover { background: #e5e7eb; color: var(--text-primary); }
        .btn-delete:hover { background: #fee2e2; color: #ef4444; border-color: #fca5a5; }
        .btn-toggle:hover { background: #e0e7ff; color: #4f46e5; border-color: #c7d2fe; }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-layer-group"></i>
                <span>NEXUS</span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
            <a href="users.html" class="nav-item"><i class="fas fa-users"></i><span>Users</span></a>
            <a href="hosts.html" class="nav-item"><i class="fas fa-user-tie"></i><span>Hosts</span></a>
            <a href="properties.html" class="nav-item active"><i class="fas fa-building"></i><span>Properties</span></a>
            <a href="gyms.html" class="nav-item"><i class="fas fa-dumbbell"></i><span>Gyms</span></a>
            <a href="restaurants.html" class="nav-item"><i class="fas fa-utensils"></i><span>Restaurants</span></a>
            <a href="fests.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Fests</span></a>
            <a href="colleges.html" class="nav-item"><i class="fas fa-university"></i><span>Colleges</span></a>
        </nav>
    </aside>

    <main class="main-content" id="mainContent">
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-toggle" id="mobileMenuToggle"><i class="fas fa-bars"></i></button>
                <h2>Create Sponsored Home Ad</h2>
            </div>
            <a href="properties.html" style="color: #4f46e5; text-decoration: none; font-weight: 600;"><i class="fas fa-arrow-left"></i> Back to Properties</a>
        </header>

        <div class="page-content">
            <div class="form-card">
                <form id="sponsoredForm">
                    <div class="form-group">
                        <label>Company / Project Name</label>
                        <input type="text" id="companyName" required placeholder="e.g. DLF Magnolias">
                    </div>
                    
                    <div class="form-group">
                        <label>Starting Price (Text)</label>
                        <input type="text" id="priceStr" required placeholder="e.g. ₹5.5 Cr">
                    </div>

                    <div class="form-group">
                        <label>External Website Link</label>
                        <input type="url" id="externalLink" required placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label>About Information (Flip Side Text)</label>
                        <textarea id="aboutText" rows="4" required placeholder="Luxurious 4BHK apartments spanning 4,000 sq ft..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Ad Image</label>
                        <input type="file" id="imageFile" accept="image/*" required>
                        <img id="imagePreview" class="preview-img">
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">Publish Sponsored Ad <i class="fas fa-paper-plane"></i></button>
                </form>
            </div>

            <!-- New Live Queue Management Section -->
            <div class="queue-card">
                <h3 class="queue-title">Live Ad Queue</h3>
                <table class="queue-table">
                    <thead>
                        <tr>
                            <th>Ad</th>
                            <th>Company</th>
                            <th>Status</th>
                            <th>Order</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="queueBody">
                        <tr><td colspan="5" style="text-align: center; padding: 20px;">Fetching ads...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        const imageFile = document.getElementById('imageFile');
        const imagePreview = document.getElementById('imagePreview');
        let imageBase64 = null;

        imageFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imageBase64 = ev.target.result;
                    imagePreview.src = imageBase64;
                    imagePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('sponsoredForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = 'Uploading... <i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            const payload = {
                companyName: document.getElementById('companyName').value,
                priceStr: document.getElementById('priceStr').value,
                externalLink: document.getElementById('externalLink').value,
                aboutText: document.getElementById('aboutText').value,
                imageBase64: imageBase64
            };

            try {
                console.log("Sending payload...");
                const res = await fetch(`${window.API_BASE_URL}/admin/sponsored-homes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if(data.success) {
                    alert('Sponsored Home Published Successfully!');
                    document.getElementById('sponsoredForm').reset();
                    imagePreview.style.display = 'none';
                    imageBase64 = null;
                    fetchSponsoredAds(); // Refresh the table automatically
                } else {
                    alert('Failed: ' + data.message);
                }
            } catch(err) {
                console.error(err);
                alert('System Error uploading Ad.');
            } finally {
                btn.innerHTML = 'Publish Sponsored Ad <i class="fas fa-paper-plane"></i>';
                btn.disabled = false;
            }
        });

        // LIVE QUEUE MANAGEMENT LOGIC
        let sponsoredAds = [];

        async function fetchSponsoredAds() {
            try {
                const res = await fetch(`${window.API_BASE_URL}/admin/sponsored-homes`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` }
                });
                const data = await res.json();
                if(data.success) {
                    sponsoredAds = data.data;
                    renderQueue();
                }
            } catch(err) {
                console.error(err);
                document.getElementById('queueBody').innerHTML = `<tr><td colspan="5">Error loading queue.</td></tr>`;
            }
        }

        function renderQueue() {
            const tbody = document.getElementById('queueBody');
            if(sponsoredAds.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No sponsored ads live.</td></tr>`;
                return;
            }

            tbody.innerHTML = sponsoredAds.map((ad, index) => `
                <tr>
                    <td><img src="${ad.image_url}" class="ad-thumb"></td>
                    <td style="font-weight: 600;">${ad.company_name}</td>
                    <td>
                        <span class="status-badge ${ad.is_active ? 'status-active' : 'status-hidden'}">
                            ${ad.is_active ? 'Live' : 'Hidden'}
                        </span>
                    </td>
                    <td>${ad.display_order || 0}</td>
                    <td>
                        <div class="action-btns">
                            <button onclick="toggleActive('${ad.id}', ${ad.is_active})" class="action-btn btn-toggle" title="${ad.is_active ? 'Hide Ad' : 'Publish Ad'}">
                                <i class="fas ${ad.is_active ? 'fa-eye-slash' : 'fa-eye'}"></i>
                            </button>
                            <button onclick="moveAd(${index}, -1)" class="action-btn" title="Move Up" ${index === 0 ? 'disabled' : ''}>
                                <i class="fas fa-arrow-up"></i>
                            </button>
                            <button onclick="moveAd(${index}, 1)" class="action-btn" title="Move Down" ${index === sponsoredAds.length - 1 ? 'disabled' : ''}>
                                <i class="fas fa-arrow-down"></i>
                            </button>
                            <button onclick="deleteAd('${ad.id}')" class="action-btn btn-delete" title="Delete Permanent">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function toggleActive(id, currentStatus) {
            try {
                // We only update the is_active toggle, leave order identical based on currently cached array.
                const ad = sponsoredAds.find(a => a.id === id);
                if(!ad) return;

                const res = await fetch(`${window.API_BASE_URL}/admin/sponsored-homes/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` },
                    body: JSON.stringify({ is_active: !currentStatus, display_order: ad.display_order })
                });
                
                const data = await res.json();
                if(data.success) {
                    ad.is_active = !currentStatus;
                    renderQueue();
                }
            } catch(e) {
                console.error("Toggle error", e);
            }
        }

        async function deleteAd(id) {
            if(!confirm("Are you sure you want to permanently delete this ad?")) return;
            try {
                const res = await fetch(`${window.API_BASE_URL}/admin/sponsored-homes/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` }
                });
                const data = await res.json();
                if(data.success) {
                    fetchSponsoredAds(); // Reload fully
                }
            } catch(e) {
                console.error("Delete error", e);
            }
        }

        async function moveAd(index, direction) {
            // direction -1 is UP, 1 is DOWN
            if(index + direction < 0 || index + direction >= sponsoredAds.length) return;
            
            // Swap orders fundamentally
            const ad1 = sponsoredAds[index];
            const ad2 = sponsoredAds[index + direction];

            // If they share exactly the same order currently, fallback to strictly indexing them
            let order1 = ad1.display_order || index * 10;
            let order2 = ad2.display_order || (index + direction) * 10;

            if(order1 === order2) {
                order1 = index * 10;
                order2 = (index + direction) * 10;
            }

            // Fire parallel updates to swap orders
            try {
                await Promise.all([
                    fetch(`${window.API_BASE_URL}/admin/sponsored-homes/${ad1.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` },
                        body: JSON.stringify({ is_active: ad1.is_active, display_order: order2 })
                    }),
                    fetch(`${window.API_BASE_URL}/admin/sponsored-homes/${ad2.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` },
                        body: JSON.stringify({ is_active: ad2.is_active, display_order: order1 })
                    })
                ]);
                fetchSponsoredAds(); // Refresh table to reflect new SQL DB order via backend sort
            } catch(e) {
                alert("Failed to reorder. Please check connection.");
            }
        }

        // Init on load
        fetchSponsoredAds();
    </script>
</body>
</html>
