<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants | NEXUS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/users.css">
    <style>
        .status-badge {
            padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-published { background: #d4edda; color: #155724; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        
        .action-btn { background: none; border: none; cursor: pointer; padding: 5px; border-radius: 4px; transition: 0.2s; }
        .action-btn.approve { color: #10b981; }
        .action-btn.approve:hover { background: rgba(16,185,129,0.1); }
        .action-btn.reject { color: #ef4444; }
        .action-btn.reject:hover { background: rgba(239,68,68,0.1); }
        .action-btn.view { color: #3b82f6; }
        .action-btn.view:hover { background: rgba(59,130,246,0.1); }

        /* Modal Styles */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--bg-card); width: 90%; max-width: 600px;
            border-radius: 12px; padding: 25px; position: relative;
            max-height: 90vh; overflow-y: auto; color: var(--text-primary);
        }
        .close-btn {
            position: absolute; top: 20px; right: 20px; background: none; border: none;
            font-size: 1.5rem; cursor: pointer; color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-layer-group"></i>
                <span>NEXUS</span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        </div>

        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">
                <i class="fas fa-chart-line"></i><span>Dashboard</span>
            </a>
            <a href="users.html" class="nav-item">
                <i class="fas fa-users"></i><span>Users</span>
            </a>
            <a href="hosts.html" class="nav-item">
                <i class="fas fa-user-tie"></i><span>Hosts</span>
            </a>
            <a href="properties.html" class="nav-item">
                <i class="fas fa-building"></i><span>Properties</span>
            </a>
            <a href="gyms.html" class="nav-item">
                <i class="fas fa-dumbbell"></i><span>Gyms</span>
            </a>
            <a href="restaurants.html" class="nav-item active">
                <i class="fas fa-utensils"></i><span>Restaurants</span>
            </a>
            <a href="fests.html" class="nav-item">
                <i class="fas fa-calendar-alt"></i><span>Fests</span>
            </a>
            <a href="colleges.html" class="nav-item">
                <i class="fas fa-university"></i><span>Colleges</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-toggle" id="mobileMenuToggle"><i class="fas fa-bars"></i></button>
                <h2>Restaurant Listings Management</h2>
            </div>
        </header>

        <div class="page-content">
            <!-- Stats Cards -->
            <div class="stats-row" style="margin-bottom: 2rem; grid-template-columns: repeat(4, 1fr);">
                <div class="stat-card">
                    <div class="stat-icon purple" style="background: rgba(236,72,153,0.15); color: #ec4899; box-shadow: 0 0 20px rgba(236,72,153,0.3);"><i class="fas fa-utensils"></i></div>
                    <div class="stat-info">
                        <h3 id="statTotal">0</h3>
                        <p>Total Restaurants</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <h3 id="statPending">0</h3>
                        <p>Pending Review</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <h3 id="statApproved">0</h3>
                        <p>Accepted</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red" style="background: rgba(239, 68, 68, 0.15); color: var(--red); box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);"><i class="fas fa-times-circle"></i></div>
                    <div class="stat-info">
                        <h3 id="statRejected">0</h3>
                        <p>Rejected</p>
                    </div>
                </div>
            </div>

            <div class="data-card">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Restaurant Name</th>
                                <th>Host / Owner</th>
                                <th>Cuisines</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="restaurantsTableBody">
                            <tr><td colspan="5" style="text-align: center;">Loading restaurants...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Restaurant Details Modal -->
    <div class="modal" id="restaurantModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <h2 id="modalTitle" style="margin-bottom:15px;">Restaurant Details</h2>
            
            <div id="modalBody">
                <!-- Content injected dynamically -->
            </div>
            
            <div style="margin-top:20px; display:flex; gap:10px; justify-content:flex-end;" id="modalActions">
                <!-- Actions injected dynamically -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>

    <script src="js/restaurants.js"></script>
    <script src="js/sidebar.js"></script>
</body>
</html>
